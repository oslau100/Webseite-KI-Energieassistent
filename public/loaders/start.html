<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  (async function () {
    const bootstrap = (window.TB_BOOTSTRAP && typeof window.TB_BOOTSTRAP === "object") ? window.TB_BOOTSTRAP : {};
    const qp = new URLSearchParams(window.location.search);

    const config = {
      locationId: String(bootstrap.locationId || qp.get("location_id") || "").trim(),
      avatarUrl: String(bootstrap.avatarUrl || "").trim(),
      supabaseUrl: String(bootstrap.supabaseUrl || "").trim(),
      supabaseKey: String(bootstrap.supabaseKey || "").trim(),
      offerUrl: String(bootstrap.offerUrl || "").trim(),
      settingProxyPath: String(bootstrap.settingProxyPath || "").trim(),
      engineUrl: String(bootstrap.settingEngineUrl || "").trim()
    };

    try {
      if (!config.locationId || !config.supabaseUrl || !config.supabaseKey) {
        throw new Error("Missing TB_BOOTSTRAP values: locationId, supabaseUrl, supabaseKey");
      }

      const client = supabase.createClient(config.supabaseUrl, config.supabaseKey);
      const { data, error } = await client.from('kunden_config').select('*').eq('location_id', config.locationId).single();
      if (error) throw error;

      window.KUNDEN_DATA = data;
      const runtime = (data && typeof data.runtime_config === "object" && data.runtime_config) ? data.runtime_config : {};
      const urls = (data && typeof data.url_config === "object" && data.url_config) ? data.url_config : {};
      window.SURVEY_CONFIG = {
        ...config,
        avatarUrl: String(runtime.avatar_url || config.avatarUrl || ""),
        offerUrl: String(urls.offer_base_url || config.offerUrl || ""),
        settingProxyPath: String(runtime.setting_proxy_path || config.settingProxyPath || ""),
        engineUrl: String(runtime.setting_engine_url || config.engineUrl || "")
      };

      const d = data.setting_survey_design || {};

      const root = document.documentElement;
      root.style.setProperty('--primary-color', d.primary_color || '#00ff9d');
      root.style.setProperty('--bg-card', d.bg_card || '#ffffff');
      root.style.setProperty('--text-color', d.text_color || '#334155');
      root.style.setProperty('--border-radius', d.border_radius || '2.5rem');
      root.style.setProperty('--btn-bg', d.start_button?.bg_color || '#0f172a');
      root.style.setProperty('--btn-text', d.start_button?.text_color || '#00ff9d');
      root.style.setProperty('--back-bg', d.back_button?.bg_color || 'transparent');
      root.style.setProperty('--back-text', d.back_button?.text_color || '#94a3b8');

      const engineUrl = window.SURVEY_CONFIG.engineUrl;
      if (!engineUrl) throw new Error("Missing setting engine URL (runtime_config.setting_engine_url)");
      const engineResp = await fetch(engineUrl + (engineUrl.includes("?") ? "&" : "?") + "v=" + Date.now());
      const script = document.createElement('script');
      script.text = await engineResp.text();
      document.body.appendChild(script);

    } catch {
      document.getElementById("survey-app").innerHTML = "<div style='text-align:center;color:#ef4444;font-weight:800;'>Fehler beim Laden.</div>";
    }
  })();
</script>
