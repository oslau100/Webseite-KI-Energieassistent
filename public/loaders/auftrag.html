<script>
  (async function () {
    const bootstrap = (window.TB_BOOTSTRAP && typeof window.TB_BOOTSTRAP === "object") ? window.TB_BOOTSTRAP : {};
    const config = {
      locationId: String(bootstrap.locationId || "").trim(),
      supabaseUrl: String(bootstrap.supabaseUrl || "").trim(),
      supabaseKey: String(bootstrap.supabaseKey || "").trim(),
      engineUrl: String(bootstrap.closingEngineUrl || "").trim(),
      closingProxyPath: String(bootstrap.closingProxyPath || "").trim(),
      offerUrl: String(bootstrap.offerUrl || "").trim(),
      langOverride: null,
      uuidOverride: null
    };

    const url = new URL(window.location.href);
    const langParam = (url.searchParams.get("lang") || "").trim().toLowerCase();
    const uuidParam = (url.searchParams.get("uuid") || "").trim();
    if (langParam) config.langOverride = langParam;
    if (uuidParam) config.uuidOverride = uuidParam;

    function applyDesignVars(design) {
      const d = design || {};
      const root = document.documentElement;
      if (d.primary_color) root.style.setProperty("--primary-color", d.primary_color);
      if (d.bg_card) root.style.setProperty("--bg-card", d.bg_card);
      if (d.text_color) root.style.setProperty("--text-color", d.text_color);
      if (d.border_radius) root.style.setProperty("--border-radius", d.border_radius);
      if (d.text_color_strong) root.style.setProperty("--text-color-strong", d.text_color_strong);
      if (d.back_button && typeof d.back_button === "object") {
        if (d.back_button.bg_color) root.style.setProperty("--back-bg", d.back_button.bg_color);
        if (d.back_button.text_color) root.style.setProperty("--back-text", d.back_button.text_color);
      }
      if (d.start_button && typeof d.start_button === "object") {
        if (d.start_button.bg_color) root.style.setProperty("--btn-bg", d.start_button.bg_color);
        if (d.start_button.text_color) root.style.setProperty("--btn-text", d.start_button.text_color);
      }
      if (d.card_padding_top) root.style.setProperty("--card-padding-top", d.card_padding_top);
      if (d.card_padding_x) root.style.setProperty("--card-padding-x", d.card_padding_x);
      if (d.card_padding_bottom) root.style.setProperty("--card-padding-bottom", d.card_padding_bottom);
    }

    function showFatal(msg) {
      const mount = document.getElementById("survey-app");
      mount.innerHTML = `<div class="survey-card-container"><h2 class="survey-question" style="color:#ef4444;">${String(msg || "Error")}</h2><div class="survey-subtext">Bitte Seite neu laden oder später erneut versuchen.</div></div>`;
    }

    try {
      if (!config.locationId || !config.supabaseUrl || !config.supabaseKey) {
        throw new Error("Missing TB_BOOTSTRAP values: locationId, supabaseUrl, supabaseKey");
      }

      const client = supabase.createClient(config.supabaseUrl, config.supabaseKey);
      const { data, error } = await client.from("kunden_config").select("*").eq("location_id", config.locationId).single();
      if (error) throw error;

      window.KUNDEN_DATA = data;
      const runtime = (data && typeof data.runtime_config === "object" && data.runtime_config) ? data.runtime_config : {};
      const urls = (data && typeof data.url_config === "object" && data.url_config) ? data.url_config : {};
      window.SURVEY_CONFIG = {
        ...config,
        engineUrl: String(runtime.closing_engine_url || config.engineUrl || ""),
        closingProxyPath: String(runtime.closing_proxy_path || config.closingProxyPath || ""),
        offerUrl: String(urls.offer_base_url || config.offerUrl || "")
      };

      const design = data.closing_survey_design || data.setting_survey_design || {};
      applyDesignVars(design);

      const engineUrl = window.SURVEY_CONFIG.engineUrl;
      if (!engineUrl) throw new Error("Missing closing engine URL (runtime_config.closing_engine_url)");
      const engineSrc = engineUrl + (engineUrl.includes("?") ? "&" : "?") + "v=" + Date.now();
      const s = document.createElement("script");
      s.src = engineSrc;
      s.async = true;
      s.onerror = function () { showFatal("Engine konnte nicht geladen werden (Bucket Asset nicht erreichbar)."); };
      document.body.appendChild(s);
    } catch {
      showFatal("Fehler beim Laden. Bitte versuche es erneut.");
    }
  })();
</script>
